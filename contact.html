<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltEdge Powerbank | Contact Us</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; line-height: 1.6; }
        header { position: fixed; top: 0; left: 0; width: 100%; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; z-index: 1000; }
        .logo-container img { height: 40px; }
        nav a { color: #94a3b8; text-decoration: none; margin-left: 2rem; font-weight: 500; }
        nav a.active, nav a:hover { color: #38bdf8; }
        .page { min-height: 100vh; padding: 120px 5% 80px 5%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        h2 { font-size: 2.5rem; text-align: center; margin-bottom: 1rem; }
        p { color: #94a3b8; max-width: 600px; text-align: center; margin-bottom: 2rem; }
        form { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 1rem; }
        input, textarea { width: 100%; padding: 1rem; background-color: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; }
        input:focus, textarea:focus { outline: none; border-color: #38bdf8; }
        .btn { background-color: #38bdf8; color: #0f172a; padding: 0.75rem 2rem; border-radius: 50px; border: none; font-weight: 600; cursor: pointer; text-align: center; }
        footer { background-color: #020617; text-align: center; padding: 2rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><img src="logo.png" alt="VoltEdge Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='⚡ VoltEdge';"></div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="features.html">Features</a>
            <a href="gallery.html">Gallery</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="page">
        <h2>Get In Touch</h2>
        <p>Have questions about compatibility, bulk transit orders, or shipping? Drop us a message.</p>
        
        <form onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email Address" required>
            <textarea rows="5" placeholder="How can we help you?" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </main>

    <footer><p>&copy; 2026 VoltEdge Technologies.</p></footer>
</body>
</html>
